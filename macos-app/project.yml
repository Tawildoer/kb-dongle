name: KBDongle
options:
  bundleIdPrefix: com.specter
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15"
targets:
  KBDongle:
    type: application
    platform: macOS
    sources:
      - path: KBDongle
    info:
      path: KBDongle/Info.plist
      properties:
        LSUIElement: true
        NSBluetoothAlwaysUsageDescription: "KBDongle uses Bluetooth to connect to your ESP32 dongles."
        NSPrincipalClass: NSApplication
    entitlements:
      path: KBDongle/KBDongle.entitlements
    settings:
      base:
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        CODE_SIGN_STYLE: Automatic
        PRODUCT_BUNDLE_IDENTIFIER: com.specter.kbdongle
  KBDongleTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: KBDongleTests
    dependencies:
      - target: KBDongle
    settings:
      base:
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "13.0"
